<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GitLogBook</title>
    <link rel="stylesheet" href="/styles.css?v=5">
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>GitLogBook</h1>
        <p>Local ADIF logger and static public log publisher</p>
      </div>
      <nav>
        <a href="/site" target="_blank">Preview Site</a>
        <button id="exportButton" type="button">Export</button>
        <button id="publishButton" type="button">Publish</button>
      </nav>
    </header>

    <main class="layout">
      <section class="panel form-panel">
        <div class="panel-title">
          <h2 id="formTitle">New QSO</h2>
          <button id="resetButton" type="button" class="ghost">Clear</button>
        </div>
        <form id="qsoForm">
          <input type="hidden" name="id">
          <label>Callsign <input name="call" required autocomplete="off" placeholder="W1AW"></label>
          <div class="split">
            <label>Date <input name="qsoDate" required type="date"></label>
            <label>Time UTC <input name="timeOn" required type="time"></label>
          </div>
          <div class="split">
            <label>Band
              <select name="band" required>
                <option value="">Select band</option>
                <option>2190m</option>
                <option>630m</option>
                <option>160m</option>
                <option>80m</option>
                <option>60m</option>
                <option>40m</option>
                <option>30m</option>
                <option>20m</option>
                <option>17m</option>
                <option>15m</option>
                <option>12m</option>
                <option>10m</option>
                <option>6m</option>
                <option>4m</option>
                <option>2m</option>
                <option>1.25m</option>
                <option>70cm</option>
                <option>33cm</option>
                <option>23cm</option>
                <option>13cm</option>
                <option>9cm</option>
                <option>6cm</option>
                <option>3cm</option>
                <option>1.25cm</option>
                <option>6mm</option>
                <option>4mm</option>
                <option>2.5mm</option>
                <option>2mm</option>
                <option>1mm</option>
              </select>
            </label>
            <label>Frequency <input name="freq" required inputmode="decimal" placeholder="14.250"></label>
          </div>
          <div class="split">
            <label>Mode
              <select name="mode" required>
                <option>CW</option>
                <option>SSB</option>
                <option>FT8</option>
                <option>AM</option>
                <option>FM</option>
                <option>RTTY</option>
                <option>FT4</option>
                <option>PSK31</option>
                <option>JS8</option>
                <option>JT65</option>
                <option>JT9</option>
                <option>MSK144</option>
                <option>VARA</option>
                <option>ARDOP</option>
                <option>PACKET</option>
                <option>SSTV</option>
                <option>ATV</option>
                <option>DATA</option>
                <option>DIGITALVOICE</option>
                <option>OTHER</option>
              </select>
            </label>
            <label>Grid <input name="grid" placeholder="FN31"></label>
          </div>
          <div class="split">
            <label>RST Sent <input name="rstSent" required placeholder="599"></label>
            <label>RST Rcvd <input name="rstRcvd" required placeholder="599"></label>
          </div>
          <div class="split">
            <label>Country <input name="country" placeholder="United States"></label>
            <label>State <input name="state" placeholder="CT"></label>
          </div>
          <input type="hidden" name="lat">
          <input type="hidden" name="lon">
          <input type="hidden" name="locationSource">
          <input type="hidden" name="locationConfidence">
          <label>Private Comment <textarea name="comment" rows="3"></textarea></label>
          <div class="actions">
            <button id="lookupButton" type="button" class="secondary">Lookup</button>
            <button type="submit">Save QSO</button>
          </div>
        </form>
        <p id="formStatus" class="status"></p>
      </section>

      <section class="panel settings-panel">
        <div class="panel-title">
          <div>
            <h2>Site Settings</h2>
            <p>Public page branding and links</p>
          </div>
        </div>
        <form id="settingsForm">
          <label>Logbook Repo Path <input name="deploymentRepoPath" placeholder="/home/you/path/to/YOURCALL-Logbook"></label>
          <div class="split">
            <label>Station Call <input name="stationCallsign" placeholder="YOURCALL"></label>
            <label>My Grid <input name="myGrid" placeholder="FN31"></label>
          </div>
          <label>Public Title <input name="publicTitle" placeholder="YOURCALL Logbook"></label>
          <label>Subtitle <input name="publicSubtitle" placeholder="Read-only amateur radio contact log"></label>
          <label>About Title <input name="aboutTitle" placeholder="About YOURCALL"></label>
          <label>About Body <textarea name="aboutBody" rows="4"></textarea></label>
          <label>Profile Image URL <input name="profileImageUrl" placeholder="https://github.com/YOUR_USERNAME.png"></label>
          <div class="split">
            <label>Git Remote <input name="gitRemote" placeholder="origin"></label>
            <label>Git Branch <input name="gitBranch" placeholder="main"></label>
          </div>
          <label>Commit Message <input name="gitCommitTemplate" placeholder="Publish log update"></label>
          <div class="actions">
            <button type="submit">Save Settings</button>
          </div>
        </form>
        <p id="settingsStatus" class="status"></p>
      </section>

      <section class="panel import-panel">
        <div class="panel-title">
          <div>
            <h2>Import ADIF</h2>
            <p>Merge a local .adi file into this log</p>
          </div>
        </div>
        <form id="importForm">
          <label>ADIF File Path <input name="path" placeholder="/home/beegs/Downloads/log.adi"></label>
          <div class="actions">
            <button type="submit">Import File</button>
          </div>
        </form>
        <p id="importStatus" class="status"></p>
      </section>

      <section class="panel log-panel">
        <div class="panel-title">
          <div>
            <h2>Local Log</h2>
            <p id="summary">0 QSOs</p>
          </div>
          <input id="searchInput" type="search" placeholder="Search calls, band, mode, grid">
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Date</th>
                <th>Time</th>
                <th>Call</th>
                <th>Band</th>
                <th>Mode</th>
                <th>Grid</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="qsoRows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <dialog id="appDialog" class="modal">
      <form method="dialog">
        <div class="modal-head">
          <h2 id="dialogTitle">GitLogBook</h2>
          <button id="dialogCloseButton" type="submit" value="cancel" class="ghost" aria-label="Close">Close</button>
        </div>
        <p id="dialogMessage"></p>
        <pre id="dialogDetails" hidden></pre>
        <div class="modal-actions">
          <button id="dialogCancelButton" type="submit" value="cancel" class="secondary">Cancel</button>
          <button id="dialogConfirmButton" type="submit" value="confirm">OK</button>
        </div>
      </form>
    </dialog>

    <script src="/app.js?v=6"></script>
  </body>
</html>
