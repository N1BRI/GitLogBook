<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="640" viewBox="0 0 1000 640" role="img" aria-labelledby="title desc">
  <title id="title">GitLogBook Markdown blog archive</title>
  <desc id="desc">A representative screenshot of the searchable Markdown post archive and generated article page.</desc>
  <rect width="1000" height="640" fill="#f5f7fa"/>
  <rect x="88" y="42" width="824" height="50" rx="8" fill="#152238"/>
  <text x="116" y="74" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Logbook</text>
  <text x="204" y="74" fill="#fff" font-family="Arial, sans-serif" font-size="16" font-weight="700">Posts</text>
  <rect x="88" y="116" width="824" height="430" rx="8" fill="#fff" stroke="#dce3ea"/>
  <text x="126" y="170" fill="#152238" font-family="Arial, sans-serif" font-size="42" font-weight="700">Posts</text>
  <rect x="126" y="198" width="740" height="44" rx="6" fill="#fbfdff" stroke="#c8d2dc"/>
  <text x="148" y="226" fill="#697586" font-family="Arial, sans-serif" font-size="15">Search posts</text>
  <rect x="126" y="274" width="740" height="136" rx="8" fill="#fff" stroke="#dce3ea"/>
  <text x="150" y="306" fill="#697586" font-family="Arial, sans-serif" font-size="12" font-weight="700">01/02/2026</text>
  <text x="150" y="342" fill="#152238" font-family="Arial, sans-serif" font-size="24" font-weight="700" text-decoration="underline">Sample Field Note</text>
  <text x="150" y="370" fill="#697586" font-family="Arial, sans-serif" font-size="12" font-weight="700">SAMPLE / PORTABLE / HOMEBREW</text>
  <text x="150" y="398" fill="#405064" font-family="Arial, sans-serif" font-size="16">Markdown posts become searchable static pages for activations, projects, and field reports.</text>
  <rect x="126" y="448" width="740" height="54" rx="8" fill="#e8f3f1"/>
  <text x="150" y="482" fill="#0b5f59" font-family="Arial, sans-serif" font-size="17" font-weight="700">Recent posts are shown automatically in the public logbook sidebar.</text>
</svg>
